---
assert_lefthook_installed: true
colors: true
post-commit:
  jobs:
    - name: auto-bundle-update
      run: bash bin/bundle-auto-update
pre-commit:
  parallel: true
  jobs:
    - name: bundle-audit
      run: bundle exec bundle-audit --update
    - name: standardrb
      run: bundle exec standardrb
      glob: '*.rb'
      stage_fixed: true

pre-push:
  parallel: true
  jobs:
    - name: standardrb
      run: bundle exec standardrb
